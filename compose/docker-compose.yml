# Cloud Engineering Lab – main orchestration file
#
# This file does NOT build images. It only pulls pre-built images from GHCR.
# Images are built and pushed automatically by GitHub Actions in each app repo.
#
# Start:   python start.py
# Stop:    docker compose down
# Update:  docker compose pull && docker compose up -d
#
# To re-seed the database (e.g. after a full reset):
#   docker compose down -v
#   docker compose up -d

services:

  # ── Violet-board (webshop) ────────────────────────────────────────────────

  violetboard-app:
    image: ghcr.io/vitaweyden/violet-board-app:latest
    restart: unless-stopped
    env_file: violetboard.env
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: violetboard-db
      DB_PORT: 5432
    volumes:
      - violetboard-seeded:/var/www/.seed-marker
    depends_on:
      violetboard-db:
        condition: service_healthy
    networks:
      violetboard-net:
        aliases:
          - app

  violetboard-web:
    image: ghcr.io/vitaweyden/violet-board-web:latest
    restart: unless-stopped
    ports:
      - "8100:80"
    depends_on:
      - violetboard-app
    networks:
      - violetboard-net

  violetboard-db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: violetboard.env
    volumes:
      - violetboard-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - violetboard-net

  # ── Echoo (chat app) ──────────────────────────────────────────────────────

  echoo-backend:
    image: ghcr.io/vitaweyden/echoo-backend:latest
    restart: unless-stopped
    env_file: echoo.env
    environment:
      HOST: 0.0.0.0
      PORT: 3333
      NODE_ENV: production
      LOG_LEVEL: info
      DB_HOST: echoo-db
      DB_PORT: 5432
    volumes:
      - echoo-seeded:/app/.seed-marker
    ports:
      - "3334:3333"
    depends_on:
      echoo-db:
        condition: service_healthy
    networks:
      - echoo-net

  echoo-frontend:
    image: ghcr.io/vitaweyden/echoo-frontend:latest
    restart: unless-stopped
    ports:
      - "8101:80"
    depends_on:
      - echoo-backend
    networks:
      - echoo-net

  echoo-db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: echoo.env
    volumes:
      - echoo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echoo-net

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  violetboard-pgdata:
  violetboard-seeded:
  echoo-pgdata:
  echoo-seeded:

networks:
  violetboard-net:
    driver: bridge
  echoo-net:
    driver: bridge