# Nginx web container for Violet-board.
# Exposed externally via a LoadBalancer service on port 8100.
# k3d routes this automatically because the cluster was created with
# --port "8100:8100@loadbalancer".

apiVersion: apps/v1
kind: Deployment
metadata:
  name: violetboard-web
  namespace: violetboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: violetboard-web
  template:
    metadata:
      labels:
        app: violetboard-web
    spec:
      containers:
        - name: violetboard-web
          image: ghcr.io/vitaweyden/violet-board-web:latest
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: violetboard-web
  namespace: violetboard
spec:
  type: LoadBalancer
  selector:
    app: violetboard-web
  ports:
    - port: 8100
      targetPort: 80